appId: dev.sky.skymark
productName: Skymark
copyright: Copyright © 2026 William Huynh
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!**/.vite"
  - "!**/*.map"
asar: true
win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  artifactName: Skymark-${version}-${ext}.${ext}
  publisherName: William Huynh
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Skymark
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: williamhuynh
  repo: Skymark
  releaseType: draft
