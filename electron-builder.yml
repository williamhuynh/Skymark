appId: dev.sky.skymark
productName: Skymark
copyright: Copyright © 2026 William Huynh
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - package.json
  - "!**/.vite"
  - "!**/*.map"
asar: true
win:
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  # NOTE: intentionally not setting publisherName. When set, electron-updater
  # runs a PowerShell signature-verification check on downloaded installers
  # and fails for unsigned builds. Since we ship unsigned personal
  # binaries, omitting publisherName tells electron-updater to skip that
  # check entirely (see NsisUpdater.verifySignature).
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Skymark
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: Skymark-Setup-${version}.${ext}
publish:
  provider: github
  owner: williamhuynh
  repo: Skymark
  releaseType: draft
